{{ define "main" }}
<div class="card">
  <div class="card__banner"></div>
  <img class="card__avatar" src="https://avatars3.githubusercontent.com/u/17457?s=460&v=4" alt="Photo of Patrick Raynor">
  <div class="card__body">
    <h1 class="card__name">{{ .Site.Params.author }}</h1>
    <p class="card__tagline">{{ .Description }}</p>
    <ul class="card__links">
      {{ range hugo.Data.socials.items }}
      <li><a href="{{ .href }}">{{ .name }}</a></li>
      {{ end }}
    </ul>
  </div>
</div>
{{ end }}
