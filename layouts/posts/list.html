{{ define "main" }}
<h1>Archive</h1>
{{ range .Pages.GroupByDate "2006" }}
  <section class="archive-year">
    <h2>{{ .Key }}</h2>
    <ul>
      {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2" }}</time>
      </li>
      {{ end }}
    </ul>
  </section>
{{ else }}
  <p>No posts yet.</p>
{{ end }}
{{ end }}
