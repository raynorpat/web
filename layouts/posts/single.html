{{ define "main" }}
<article class="post">
  <h1 class="post__title">{{ .Title }}</h1>
  <p class="post__date"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time> &middot; {{ .ReadingTime }} min read</p>
  <div class="post__body">
    {{ .Content }}
  </div>
  <nav class="post__pager">
    {{ with .PrevInSection }}<a href="{{ .RelPermalink }}" rel="prev">&larr; {{ .Title }}</a>{{ end }}
    {{ with .NextInSection }}<a href="{{ .RelPermalink }}" rel="next">{{ .Title }} &rarr;</a>{{ end }}
  </nav>
</article>
{{ end }}
